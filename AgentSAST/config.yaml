# AgentSAST configuration. ${VARS} are expanded from the environment / .env.
server:
  port: "${SAST_PORT}"
  work_root: "${SAST_WORK_ROOT}"

mysql:
  dsn: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(${MYSQL_HOST}:${MYSQL_PORT})/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=Local"

minio:
  endpoint: "${MINIO_ENDPOINT}"
  access_key: "${MINIO_ROOT_USER}"
  secret_key: "${MINIO_ROOT_PASSWORD}"
  bucket: "${MINIO_BUCKET}"
  use_ssl: ${MINIO_USE_SSL}

llm:
  # OpenAI-compatible chat-completions endpoint (same provider AgentDAST uses).
  llm_base_url: "${LLM_BASE_URL}"
  llm_api_key: "${LLM_API_KEY}"
  llm_model: "${LLM_MODEL}"