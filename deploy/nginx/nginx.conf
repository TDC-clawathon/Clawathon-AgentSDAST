worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HTTP -> HTTPS (clawathon.cloud only)
    server {
        listen 80 default_server;
        server_name clawathon.cloud;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        http2 on;
        server_name clawathon.cloud;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/private-key.pem;

        client_max_body_size 200m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        location /minio/health/ {
            set $minio_upstream runtime-minio:9000;
            proxy_pass http://$minio_upstream/minio/health/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
        }

        location /minio/console/ {
            set $minio_console_upstream runtime-minio:9001;
            rewrite ^/minio/console/(.*) /$1 break;
            proxy_pass http://$minio_console_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400s;
        }

        location = /minio/console {
            return 301 /minio/console/;
        }

        location /agentsdast/ {
            set $minio_upstream runtime-minio:9000;
            proxy_pass http://$minio_upstream/agentsdast/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            chunked_transfer_encoding off;
        }

        location = /agentsdast {
            return 301 /agentsdast/;
        }

        location / {
            set $manager_upstream manager:8080;
            proxy_pass http://$manager_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
        }
    }
}
